services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - OMR_SERVICE_URL=${OMR_SERVICE_URL:-http://homr:8080}
      - OMR_HEALTHCHECK_TIMEOUT_SECONDS=${OMR_HEALTHCHECK_TIMEOUT_SECONDS:-2}
      - OMR_REQUEST_TIMEOUT_SECONDS=${OMR_REQUEST_TIMEOUT_SECONDS:-330}
      - REPEATER_WARNING_THRESHOLD=${REPEATER_WARNING_THRESHOLD:-300}

  # Audiveris は公式 Linux 配布物が amd64 のみ。ARM ホストでは Docker の
  # linux/amd64 エミュレーションを利用する。
  omr:
    build: ./omr
    platform: linux/amd64
    profiles: ["omr"]
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - AUDIVERIS_MIN_HEAP=${AUDIVERIS_MIN_HEAP:-512m}
      - AUDIVERIS_MAX_HEAP=${AUDIVERIS_MAX_HEAP:-8G}
      - OMR_TRANSCRIBE_TIMEOUT_SECONDS=${OMR_TRANSCRIBE_TIMEOUT_SECONDS:-300}
      - OMR_PROCESS_TERM_GRACE_SECONDS=${OMR_PROCESS_TERM_GRACE_SECONDS:-2}
      - OMR_GRACEFUL_SHUTDOWN_SECONDS=${OMR_GRACEFUL_SHUTDOWN_SECONDS:-3}
    stop_grace_period: 10s
    expose:
      - "8080"

  # homr(https://github.com/liebharc/homr, AGPL-3.0)によるOMR。ディープラーニング
  # ベースでAudiverisよりグランド譜表(両手ピアノ)の認識に強い。PDFは非対応のため
  # ラッパー側でページごとにPNGへラスタライズしてから渡す
  homr:
    build: ./homr
    profiles: ["homr"]
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - OMR_TRANSCRIBE_TIMEOUT_SECONDS=${OMR_TRANSCRIBE_TIMEOUT_SECONDS:-300}
      - OMR_PROCESS_TERM_GRACE_SECONDS=${OMR_PROCESS_TERM_GRACE_SECONDS:-2}
      - OMR_GRACEFUL_SHUTDOWN_SECONDS=${OMR_GRACEFUL_SHUTDOWN_SECONDS:-3}
    stop_grace_period: 10s
    expose:
      - "8080"
