<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mc-sheetmusic2noteblock</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/print.css" media="print">
  <script type="module" src="/js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <h1>mc-sheetmusic2noteblock</h1>
    <p>楽譜から Minecraft 音符ブロック装置の組み立て設計書を生成する</p>
  </header>
  <main class="wizard">
    <!-- 1ページ SPA、上から下へのウィザード (docs/DESIGN.md §8) -->
    <section id="upload-section" class="wizard-step">
      <h2>1. 楽譜アップロード</h2>
      <div id="dropzone" class="dropzone">
        <p>ここに楽譜ファイルをドロップ(.mid / .musicxml / .mxl)</p>
        <p class="dropzone-note">
          <span class="omr-badge">実験的機能</span>
          PDF/画像は OMR(光学楽譜認識)で読み取ります。読み取り精度は楽譜の品質に依存します。
        </p>
        <button type="button" id="file-select-button">ファイルを選択</button>
        <input type="file" id="file-input"
               accept=".mid,.musicxml,.mxl,.pdf,.png,.jpg,.jpeg" hidden>
      </div>
      <p id="upload-status" class="upload-status" hidden></p>
    </section>
    <section id="settings-section" class="wizard-step">
      <h2>2. 変換設定</h2>
      <!-- パースサマリ + 変換設定パネル (issue #29) -->
    </section>
    <section id="blueprint-section" class="wizard-step">
      <h2>3. 設計書</h2>
      <!-- サマリーカード・警告・ステップカード列 (issue #30/#31) -->
    </section>
  </main>
  <footer id="player-bar" class="player-bar">
    <!-- プレビュー再生バー (issue #33)。画面下部固定 -->
  </footer>
</body>
</html>
